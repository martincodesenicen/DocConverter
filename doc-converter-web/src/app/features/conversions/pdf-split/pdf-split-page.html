<app-conversion-layout
  title="Split PDF"
  description="Extract a range of pages from a PDF document">

  <app-file-dropzone
    accept=".pdf"
    (filesSelected)="onFilesDropped($event)">
  </app-file-dropzone>

  @if(selectedFile()) {

    <div class="file-info">

      {{ selectedFile()?.name }}

    </div>

  }

  <form
    [formGroup]="form">

    <mat-form-field appearance="outline">

      <mat-label>
        Start Page
      </mat-label>

      <input
        matInput
        type="number"
        formControlName="startPage">

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>
        End Page
      </mat-label>

      <input
        matInput
        type="number"
        formControlName="endPage">

    </mat-form-field>

  </form>

  <button
    mat-raised-button
    color="primary"
    (click)="split()">

    Split PDF

  </button>

  <app-job-status
    [loading]="loading()"
    [status]="jobStatus()"
    (downloadClicked)="download()">
  </app-job-status>

</app-conversion-layout>
