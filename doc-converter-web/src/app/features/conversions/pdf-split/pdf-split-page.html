<app-conversion-layout
  title="Separar PDF"
  description="Extrae un rango de páginas de un documento PDF">

  <app-file-dropzone
    accept=".pdf"
    (filesSelected)="onFilesDropped($event)">
  </app-file-dropzone>

  @if(selectedFile()) {
    <div class="file-info">
      {{ selectedFile()?.name }}
    </div>
  }

  <form
    [formGroup]="form">

    <mat-form-field appearance="outline">
      <mat-label>
        Página de inicio
      </mat-label>

      <input
        matInput
        type="number"
        formControlName="startPage">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>
        Página de fin
      </mat-label>

      <input
        matInput
        type="number"
        formControlName="endPage">
    </mat-form-field>

  </form>

  <button
    mat-raised-button
    color="primary"
    (click)="split()">

    Separar PDF
  </button>

  <app-job-status
    [loading]="loading()"
    [status]="jobStatus()"
    (downloadClicked)="download()">
  </app-job-status>

</app-conversion-layout>
