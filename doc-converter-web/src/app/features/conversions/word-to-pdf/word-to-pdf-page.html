<div class="container">

  <mat-card>

    <h1>Word to PDF</h1>

    <app-file-dropzone
      accept=".doc,.docx"
      (filesSelected)="onFilesDropped($event)">
    </app-file-dropzone>

    @if(selectedFile()) {

      <div class="file-info">

        {{ selectedFile()?.name }}

      </div>

    }

    <button
      mat-raised-button
      color="primary"
      (click)="convert()">

      Convert File

    </button>

    <app-job-status
      [loading]="loading()"
     [status]="jobStatus()"
      (downloadClicked)="download()">
    </app-job-status>

  </mat-card>

</div>
