<div class="container">

  <mat-card>

    <h1>Word to PDF</h1>

    <app-file-dropzone
      accept=".doc,.docx"
      (filesSelected)="onFilesDropped($event)">
    </app-file-dropzone>

    @if(selectedFile()) {

      <div class="file-info">

        {{ selectedFile()?.name }}

      </div>

    }

    <button
      mat-raised-button
      color="primary"
      (click)="convert()">

      Convert File

    </button>

    @if(loading()) {

      <div class="spinner">
        <mat-spinner />
      </div>

    }

    @if(jobStatus()) {

      <p>
        Status:
        {{ jobStatus() }}
      </p>

    }

    @if(jobStatus() === 'Completed') {

      <button
        mat-raised-button
        (click)="download()">

        Download PDF

      </button>

    }

  </mat-card>

</div>
