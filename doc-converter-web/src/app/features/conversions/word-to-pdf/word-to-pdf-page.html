<app-conversion-layout
  title="Word to PDF"
  description="Convert DOC and DOCX files into PDF documents">

  <app-file-dropzone
    accept=".doc,.docx"
    (filesSelected)="onFilesDropped($event)">
  </app-file-dropzone>

  @if(selectedFile()) {
    <div class="file-info">
      {{ selectedFile()?.name }}
    </div>
  }

  <button
    mat-raised-button
    color="primary"
    (click)="convert()">

    Convert File
  </button>

  <app-job-status
    [loading]="loading()"
    [status]="jobStatus()"
    (downloadClicked)="download()">
  </app-job-status>

</app-conversion-layout>
