<app-conversion-layout
  title="Merge PDFs"
  description="Combina varios archivos PDF en un solo archivo PDF.">

  <app-file-dropzone
    [multiple]="true"
    accept=".pdf"
    (filesSelected)="onFilesDropped($event)">
  </app-file-dropzone>

  @if(files().length) {
    <div class="files-list">
      @for(file of files(); track file.name) {
        <div class="file-item">
          {{ file.name }}
        </div>
      }
    </div>
  }

  <button
    mat-raised-button
    color="primary"
    (click)="merge()">

    Combinar PDFs
  </button>

  <app-job-status
    [loading]="loading()"
    [status]="jobStatus()"
    (downloadClicked)="download()">
  </app-job-status>

</app-conversion-layout>
