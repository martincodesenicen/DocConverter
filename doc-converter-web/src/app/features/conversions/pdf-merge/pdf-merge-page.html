<div class="container">

  <mat-card>

    <h1>Merge PDFs</h1>

    <input
      type="file"
      multiple
      accept=".pdf"
      (change)="onFilesSelected($event)">

    @if(files().length > 0) {

      <ul>

        @for(file of files(); track file.name) {

          <li>
            {{ file.name }}
          </li>

        }

      </ul>

    }

    <button
      mat-raised-button
      color="primary"
      (click)="merge()">

      Merge PDFs

    </button>

    <app-job-status
      [loading]="loading()"
      [status]="jobStatus()"
      (downloadClicked)="download()">
    </app-job-status>

  </mat-card>

</div>
