<app-conversion-layout
  title="Merge PDFs"
  description="Combine multiple PDF files into a single document">

  <app-file-dropzone
    [multiple]="true"
    accept=".pdf"
    (filesSelected)="onFilesDropped($event)">
  </app-file-dropzone>

  @if(files().length) {

    <div class="files-list">

      @for(file of files(); track file.name) {

        <div class="file-item">

          {{ file.name }}

        </div>

      }

    </div>

  }

  <button
    mat-raised-button
    color="primary"
    (click)="merge()">

    Merge PDFs

  </button>

  <app-job-status
    [loading]="loading()"
    [status]="jobStatus()"
    (downloadClicked)="download()">
  </app-job-status>

</app-conversion-layout>
