<div class="logo-badge">
  <img
    src="icon.png"
    alt="Doc Converter">
</div>

<div class="auth-container">
  <mat-card class="auth-card">
    <h1>Doc Converter</h1>

    <p class="subtitle">
      Convierta, combine y divida documentos de forma segura.
    </p>

    <mat-tab-group>
      <mat-tab label="Iniciar sesión">
        <form
          [formGroup]="loginForm"
          (ngSubmit)="login()">

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>

            <input
              matInput
              type="email"
              formControlName="email">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Contraseña</mat-label>

            <input
              matInput
              type="password"
              formControlName="password">
          </mat-form-field>

          <button
            mat-raised-button
            color="primary"
            type="submit">

            Iniciar sesión
          </button>
        </form>
      </mat-tab>

      <mat-tab label="Registro">
        <form
          [formGroup]="registerForm"
          (ngSubmit)="register()">

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>

            <input
              matInput
              type="email"
              formControlName="email">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Contraseña</mat-label>

            <input
              matInput
              type="password"
              formControlName="password">
          </mat-form-field>

          <button
            mat-raised-button
            color="primary"
            type="submit">

            Registrarme
          </button>
        </form>
      </mat-tab>
    </mat-tab-group>

    @if(errorMessage()) {
      <p class="error">
        {{ errorMessage() }}
      </p>
    }

    @if(loading()) {
      <div class="spinner">
        <mat-spinner
          diameter="40">
        </mat-spinner>
      </div>
    }
  </mat-card>
</div>
