<app-navbar />

<div class="dashboard-container">

  <section class="hero">

    <h1>
      Doc Converter
    </h1>

    <p>
      Convert, merge and split documents quickly and securely.
    </p>

  </section>

  <section class="cards">

    <mat-card
      class="tool-card"
      routerLink="/dashboard/word-to-pdf">

      <mat-icon class="tool-icon">
        description
      </mat-icon>

      <h2>
        Word → PDF
      </h2>

      <p>
        Convert DOC and DOCX files into PDF documents.
      </p>

    </mat-card>

    <mat-card
      class="tool-card"
      routerLink="/dashboard/pdf-merge">

      <mat-icon class="tool-icon">
        join_full
      </mat-icon>

      <h2>
        Merge PDFs
      </h2>

      <p>
        Combine multiple PDF files into a single document.
      </p>

    </mat-card>

    <mat-card
      class="tool-card"
      routerLink="/dashboard/pdf-split">

      <mat-icon class="tool-icon">
        content_cut
      </mat-icon>

      <h2>
        Split PDF
      </h2>

      <p>
        Extract specific page ranges from a PDF.
      </p>

    </mat-card>

  </section>

</div>
