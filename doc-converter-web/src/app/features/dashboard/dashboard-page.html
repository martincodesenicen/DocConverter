<app-navbar />

  <div class="dashboard-container">

  <section class="hero">

    <img
      class="hero-logo"
      src="logo.png"
      alt="Doc Converter">

    <h1>
      Convert, Merge & Split PDFs
    </h1>

  </section>

  <section class="cards">

    <mat-card
      class="tool-card"
      routerLink="/dashboard/word-to-pdf">

      <mat-icon class="tool-icon">
        picture_as_pdf
      </mat-icon>

      <h2>
        Word → PDF
      </h2>

      <p>
        Convert DOC and DOCX files into PDF documents.
      </p>

    </mat-card>

    <mat-card
      class="tool-card"
      routerLink="/dashboard/pdf-merge">

      <mat-icon class="tool-icon">
        library_add
      </mat-icon>

      <h2>
        Merge PDFs
      </h2>

      <p>
        Combine multiple PDF files into a single document.
      </p>

    </mat-card>

    <mat-card
      class="tool-card"
      routerLink="/dashboard/pdf-split">

      <mat-icon class="tool-icon">
        call_split
      </mat-icon>

      <h2>
        Split PDF
      </h2>

      <p>
        Extract specific page ranges from a PDF.
      </p>

    </mat-card>

  </section>

</div>
