<div
  class="dropzone"
  (dragover)="onDragOver($event)"
  (drop)="onDrop($event)">

  <input
    #fileInput
    hidden
    type="file"
    [multiple]="multiple"
    [accept]="accept"
    (change)="onFileInput($event)">

  <div
    class="content"
    (click)="fileInput.click()">

    <div class="icon-wrapper">

      <span class="material-icons upload-icon">
        cloud_upload
      </span>

    </div>

    <h3>
      Drop your files here
    </h3>

    <p>
      Drag & drop your documents or click to browse
    </p>

    <button
      mat-flat-button
      color="primary"
      type="button">

      Select Files

    </button>

  </div>

</div>
