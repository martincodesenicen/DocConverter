@if(loading) {

  <div class="status processing">

    <mat-spinner diameter="30" />

    <span>
      Processing document...
    </span>

  </div>

}

@if(status === 'Completed') {

  <div class="status success">

    <span class="material-icons">

      check_circle

    </span>

    Conversion completed successfully

  </div>

  <button
    mat-raised-button
    color="primary"
    (click)="download()">

    Download Result

  </button>

}

@if(status === 'Failed') {

  <div class="status failed">

    <span class="material-icons">

      error

    </span>

    Conversion failed

  </div>

}
