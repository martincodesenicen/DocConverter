<div class="page-container">

  <mat-card class="conversion-card">

    <div class="top-actions">

      <button
        mat-button
        routerLink="/dashboard">

        <mat-icon>
          arrow_back
        </mat-icon>

        Dashboard

      </button>

    </div>

    <div class="breadcrumb">

      Dashboard

      <mat-icon>
        chevron_right
      </mat-icon>

      {{ title }}

    </div>

    <div class="header">

      <div class="hero-icon">

        <mat-icon>
          description
        </mat-icon>

      </div>

      <h1>
        {{ title }}
      </h1>

      <p>
        {{ description }}
      </p>

      <div class="feature-badges">

        <span>
          Secure Upload
        </span>

        <span>
          Fast Processing
        </span>

        <span>
          Free
        </span>

      </div>

    </div>

    <ng-content />

  </mat-card>

</div>
