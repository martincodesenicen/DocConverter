<div class="page-container">

  <mat-card class="conversion-card">

    <div class="top-actions">

      <button
        mat-button
        routerLink="/dashboard">

        <mat-icon>
          arrow_back
        </mat-icon>

        Dashboard

      </button>

    </div>

    <div class="breadcrumb">

      Dashboard

      <mat-icon>
        chevron_right
      </mat-icon>

      {{ title }}

    </div>

    <div class="header">

      <h1>
        {{ title }}
      </h1>

      <p>
        {{ description }}
      </p>

    </div>

    <ng-content />

  </mat-card>

</div>
